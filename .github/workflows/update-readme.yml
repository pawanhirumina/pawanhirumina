name: Time On Github

on:
  schedule:
    - cron: "0 0 * * *" # Midnight UTC every day

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: node scripts/update-readme.js

      - name: Commit changes
        run: |
          git config user.name "pawanhirumina"
          git config user.email "192177272+pawanhirumina@users.noreply.github.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "Update portfolio age"

          git push
